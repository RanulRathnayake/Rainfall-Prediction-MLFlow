<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainfall Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: #333;
        }

        .card {
            border-radius: 20px;
            border: none;
            backdrop-filter: blur(10px);
        }

        .card-header {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #0072ff, #00c6ff);
        }

        .navbar {
            background: rgba(0, 0, 0, 0.7) !important;
            backdrop-filter: blur(10px);
        }

        .alert {
            border-radius: 15px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand mx-auto fs-4">🌧 Rainfall Prediction System</span>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
        <div class="col-md-6">
            <div class="card shadow-lg">
                
                <div class="card-header text-white text-center">
                    <h4>Predict Rainfall</h4>
                </div>

                <div class="card-body p-4">

                    <form action="/predict" method="POST">

                        <div class="mb-3">
                            <label>Pressure</label>
                            <input type="number" step="0.1" class="form-control" name="pressure" required>
                        </div>

                        <div class="mb-3">
                            <label>Dewpoint</label>
                            <input type="number" step="0.1" class="form-control" name="dewpoint" required>
                        </div>

                        <div class="mb-3">
                            <label>Humidity</label>
                            <input type="number" step="0.1" class="form-control" name="humidity" required>
                        </div>

                        <div class="mb-3">
                            <label>Cloud</label>
                            <input type="number" step="0.1" class="form-control" name="cloud" required>
                        </div>

                        <div class="mb-3">
                            <label>Sunshine</label>
                            <input type="number" step="0.1" class="form-control" name="sunshine" required>
                        </div>

                        <div class="mb-3">
                            <label>Wind Direction</label>
                            <input type="number" step="0.1" class="form-control" name="winddirection" required>
                        </div>

                        <div class="mb-3">
                            <label>Wind Speed</label>
                            <input type="number" step="0.1" class="form-control" name="windspeed" required>
                        </div>

                        <button type="submit" class="btn btn-custom w-100 mt-3">
                            🔍 Predict
                        </button>

                    </form>

                </div>
            </div>

            {% if prediction_result %}
            <div class="alert alert-light text-center mt-4 shadow">
                <strong>Prediction:</strong> {{ prediction_result }}
            </div>
            {% endif %}

        </div>
    </div>

</body>
</html>
